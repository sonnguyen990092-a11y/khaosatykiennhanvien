<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo Sát Đã Kết Thúc</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .finished-container {
            text-align: center;
            padding: 50px 20px;
            max-width: 600px;
            margin: 100px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .finished-icon {
            font-size: 60px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        p { color: #7f8c8d; line-height: 1.6; font-size: 18px; }
    </style>
</head>
<body>
    <div class="finished-container">
        <div class="finished-icon">✅</div>
        <h1>Khảo Sát Đã Hoàn Thành</h1>
        <p>Cảm ơn bạn đã quan tâm. Hiện tại hệ thống đã thu thập đủ số lượng phiếu khảo sát cần thiết (11 phiếu).</p>
        <p>Hẹn gặp lại bạn trong các đợt khảo sát tiếp theo!</p>
    </div>
</body>
</html>
